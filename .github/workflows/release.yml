name: release

# Builds release binaries for macOS (Apple Silicon) and Linux (x86-64) and
# publishes them to GitHub Releases on a version tag.
#
# MOOSEDev depends on the PRIVATE MOOSE engine (Cargo path dep `../moose`,
# repo Trivyn/moose). CI clones it as a sibling using a read-only deploy key.
#   Setup (one time):
#     1. Generate a key:  ssh-keygen -t ed25519 -f moose_deploy -N ""
#     2. Add moose_deploy.pub as a *read-only* Deploy Key on github.com/Trivyn/moose
#     3. Add the private key (moose_deploy) as the secret MOOSE_DEPLOY_KEY on this repo
# The MOOSE source is only ever present ephemerally on the runner; released
# artifacts are compiled binaries only, so the closed-engine boundary holds.
# Secrets are not exposed to fork PRs (this workflow runs on tags / dispatch only).

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write   # create the GitHub Release

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14                       # Apple Silicon runner (arm64)
            target: aarch64-apple-darwin
            cargo_flags: "--features metal"   # GPU embeddings (Arctic-Embed-S) via candle Metal backend
            rustflags: ""
          - os: ubuntu-22.04                   # pinned: build against older glibc for portability
            target: x86_64-unknown-linux-gnu
            cargo_flags: ""
            # Two linker needs, both via RUSTFLAGS:
            #  1. growl and snarl-shacl (pulled via moose) each vendor the SAME slop-rdf
            #     C runtime, so both define identical rdf_* symbols. GNU ld/lld reject the
            #     duplicates (macOS ld64 tolerates them). Accept them: safe because the
            #     overlapping symbols are byte-identical (growl 0.6.1 aligns slop-rdf with
            #     snarl-shacl 0.4.1).
            #  2. Statically link libstdc++/libgcc so the binary does NOT require a newer
            #     GLIBCXX than the target ships. RocksDB (via oxigraph) pulls in libstdc++;
            #     building on 22.04/GCC 12 otherwise demands GLIBCXX_3.4.30, which older
            #     distros (Rocky/RHEL 9 = GCC 11 = GLIBCXX_3.4.29) lack. glibc stays dynamic.
            rustflags: "-C link-arg=-Wl,--allow-multiple-definition -C link-arg=-static-libstdc++ -C link-arg=-static-libgcc"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout MOOSEDev
        uses: actions/checkout@v4
        with:
          path: moosedev

      - name: Checkout private MOOSE engine (sibling ../moose)
        uses: actions/checkout@v4
        with:
          repository: Trivyn/moose
          path: moose
          ssh-key: ${{ secrets.MOOSE_DEPLOY_KEY }}

      - name: Resolve & verify version
        working-directory: moosedev
        shell: bash
        run: |
          crate=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          echo "VERSION=$crate" >> "$GITHUB_ENV"
          echo "building moosedev $crate"
          # On a tag build the tag must match Cargo.toml — no version drift in a release.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME#v}"
            [ "$tag" = "$crate" ] || { echo "::error::tag v$tag does not match Cargo.toml version $crate"; exit 1; }
          fi

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: moosedev

      - name: Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Node toolchain
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build web UI (embedded-frontend)
        working-directory: moosedev/ui
        run: |
          npm install
          npm run build

      - name: Build release binary
        working-directory: moosedev
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --locked --target ${{ matrix.target }} ${{ matrix.cargo_flags }}

      - name: Package
        working-directory: moosedev
        shell: bash
        run: |
          DIST="moosedev-v${VERSION}-${{ matrix.target }}"
          mkdir -p "$DIST"
          cp "target/${{ matrix.target }}/release/moosedev" "$DIST/"
          cp LICENSE README.md "$DIST/"
          # Runtime + companion resources the binary expects alongside it:
          #   ontologies/ — REQUIRED; loaded from disk at startup (resolved next to the binary)
          #   skills/, templates/ — agent-facing workflows + the CLAUDE.md adoption template
          cp -R ontologies skills templates "$DIST/"
          # MOOSE ENGINE ontologies (MOOSE-Pipeline.ttl, …) — required by
          # moose::initialize at runtime; ship them beside moosedev's own so a
          # fresh install can actually `--serve`, not just `--help`. (../moose is
          # the CI sibling checkout.)
          cp -R ../moose/ontologies/. "$DIST/ontologies/"
          tar -czf "$DIST.tar.gz" "$DIST"
          shasum -a 256 "$DIST.tar.gz" > "$DIST.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: moosedev-${{ matrix.target }}
          path: |
            moosedev/moosedev-v*-${{ matrix.target }}.tar.gz
            moosedev/moosedev-v*-${{ matrix.target }}.tar.gz.sha256

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  homebrew:
    name: update homebrew tap
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      # Optional: only runs once the tap repo + token exist (see docs/install.md).
      # A missing token skips the job cleanly so it never blocks a release.
      - name: Gate on tap token
        id: gate
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TAP_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::HOMEBREW_TAP_TOKEN not set; skipping Homebrew tap update."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout MOOSEDev
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Download release artifacts
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Render formula and push to tap
        if: steps.gate.outputs.enabled == 'true'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Read the checksums the build job already computed (shipped as artifacts).
          macos_sha=$(awk '{print $1}' artifacts/*/moosedev-v"${VERSION}"-aarch64-apple-darwin.tar.gz.sha256 2>/dev/null || true)
          linux_sha=$(awk '{print $1}' artifacts/*/moosedev-v"${VERSION}"-x86_64-unknown-linux-gnu.tar.gz.sha256 2>/dev/null || true)
          if [ -z "$macos_sha" ] || [ -z "$linux_sha" ]; then
            echo "::error::could not read release checksums for v${VERSION}"; exit 1
          fi
          sh packaging/homebrew/render-formula.sh "$VERSION" "$macos_sha" "$linux_sha" > moosedev.rb

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Trivyn/homebrew-moosedev.git" tap
          mkdir -p tap/Formula
          cp moosedev.rb tap/Formula/moosedev.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/moosedev.rb; then
            echo "formula already up to date for v${VERSION}"
          else
            git add Formula/moosedev.rb
            git commit -m "moosedev ${VERSION}"
            git push
          fi
